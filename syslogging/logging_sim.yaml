version: 1
disable_existing_loggers: true
formatters:
  simple:
    format: '%(asctime)s %(levelname)s %(name)s %(message)s'
    dateformat: '%Y-%m-%d %H:%M:%S'
filters:
  ibFilter:
    (): syslogging.filters.IBFilter
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
    filters: [ibFilter]
loggers:
  arctic:
    level: INFO
  matplotlib:
    level: INFO
root:
  level: DEBUG
  handlers: [console]
